<div class="calendar-container">
  
  <mat-card class="calendar-card">
    @if (isCalendarReady) {
      <mat-calendar 
        [selected]="selectedDate" 
        (selectedChange)="onDateSelected($event)" 
        [minDate]="minDate" 
        [dateFilter]="myDateFilter">
      </mat-calendar>
    } @else {
      <div style="text-align: center; padding: 40px; color: #D4AF37;">
        <mat-icon style="animation: spin 2s linear infinite;">hourglass_empty</mat-icon>
        <p>Cargando disponibilidad de Yeray...</p>
      </div>
    }
  </mat-card> @if (selectedDate) {
    <div class="slots-container">
      <div class="selection-info">
        <h3>Día: {{ selectedDate | date:'fullDate' }}</h3>
      </div>

      <div class="slots-grid">
        @for (slot of availableSlots; track slot) {
          <button 
            mat-stroked-button 
            [color]="selectedSlot === slot ? 'accent' : ''"
            [disabled]="isSlotDisabled(slot)"
            (click)="selectSlot(slot)">
            {{ slot }}
          </button>
        }
      </div>

      @if (selectedSlot) {
        <div id="confirm-zone" class="confirm-section">
          <button mat-raised-button class="btn-confirm" (click)="confirmAppointment()">
            Confirmar cita: {{ selectedSlot }}
          </button>
        </div>
      }
    </div>
  }
  
</div>
